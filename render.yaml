services:
  - type: web
    name: nova-orchestrator-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nova-orchestrator-db
          property: connectionString

databases:
  - name: nova-orchestrator-db
    plan: free
